<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <h1>Demo </h1>

  <div class="demo">
    <mi-slider id="slider" min="0" max="100" value="50" step="5">
      <mi-slider-label position="0">0℃</mi-slider-label>
      <mi-slider-label position="25">25℃</mi-slider-label>
      <mi-slider-label position="50">50℃</mi-slider-label>
      <mi-slider-label position="75">75℃</mi-slider-label>
      <mi-slider-label position="100">100℃</mi-slider-label>
    </mi-slider>
    <div id = "campo-numerico">
      <campo-numerico value="15" min="10" max="20"></campo-numerico>
    </div>
    <div id = "mi-switch">
      <mi-switch rl="Hola" ll="Chao" color="#ff0000"></mi-switch>
    </div>
    <mi-accordion>
      <mi-accordion-item>
        <span slot="heading">Item 1</span>
        <div class="panel">
          Panel one content
        </div>
      </mi-accordion-item>
      <mi-accordion-item>
        <span slot="heading">Item 2</span>
        <div class="panel">
          Panel 2 content
        </div>
      </mi-accordion-item>
      <mi-accordion-item>
        <span slot="heading">Item 3</span>
        <div class="panel">
          Panel 3 content
        </div>
      </mi-accordion-item>
    </mi-accordion>
    <mi-card class = "costum">
      Hola
    </mi-card>
    <mi-horizontal-scroll>
      <mi-card class = "costum">Card 1 </mi-card>
      <mi-card class = "costum">Card 2 </mi-card>
      <mi-card class = "costum">Card 3 </mi-card>
      <mi-card class = "costum">Card 4 </mi-card>
      <mi-card class = "costum">Card 5 </mi-card>
      <mi-card class = "costum">Card 6 </mi-card>
    </mi-horizontal-scroll>

    <mi-breadcrumb>
      <mi-breadcrumb-item href="https://www.google.com/">Home</mi-breadcrumb-item>
      <mi-breadcrumb-item href="#">Next Level Down</mi-breadcrumb-item>
      <mi-breadcrumb-item>Current Location</mi-breadcrumb-item>
    </mi-breadcrumb>

  </div>

  <p>Valor actual: <span id="salida">50</span>℃</p>

  <script type="module" src="./componentes/mi-slider.js"></script>
  <script type="module" src="./componentes/campo-numerico.js"></script>
  <script type="module" src="./componentes/mi-switch.js"></script>
  <script type="module" src="./componentes/mi-accordion.js"></script>
  <script type="module" src="./componentes/mi-card.js"></script>
  <script type="module" src="./componentes/mi-horizontal-scroll.js"></script>
  <script type="module" src="./componentes/mi-breadcrumb.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
